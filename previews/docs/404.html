<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const path = window.location.pathname;

        const previewMatch = path.match(/^\/(?:raweb\/)?previews\/([^/]+)/);
        const isPreview = Boolean(previewMatch);

        const hasRawebPrefix = path.startsWith("/raweb");

        const base = isPreview
          ? hasRawebPrefix
            ? `/raweb/previews/${previewMatch[1]}`
            : `/previews/${previewMatch[1]}`
          : hasRawebPrefix
          ? `/raweb`
          : ``;

        const href = encodeURIComponent(window.location.href);

        if (path.endsWith("/login") || path.endsWith("/login/")) {
          location.replace(`${base}/login.html?originalUrl=${href}`);
        } else if (path.endsWith("/logoff") || path.endsWith("/logoff/")) {
          location.replace(`${base}/logoff.html?originalUrl=${href}`);
        } else if (path.endsWith("/password") || path.endsWith("/password/")) {
          location.replace(`${base}/password.html?originalUrl=${href}`);
        } else if (path.endsWith("/docs") || path.replace(base, '').includes("/docs/")) {
          location.replace(`${base}/docs.html?originalUrl=${href}`);
        } else {
          location.replace(`${base}/index.html?originalUrl=${href}`);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
