<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const path = window.location.pathname;

        // detect preview branch, e.g. /raweb/previews/feature-x/
        const previewMatch = path.match(/^\/raweb\/previews\/([^/]+)/);
        const isPreview = Boolean(previewMatch);
        const base = isPreview
          ? `/raweb/previews/${previewMatch[1]}`
          : `/raweb`;

        // relative routing
        if (path.endsWith('/login') || path.endsWith('/login/')) {
          location.replace(`${base}/login.html`);
        } else if (path.endsWith('/logoff') || path.endsWith('/logoff/')) {
          location.replace(`${base}/logoff.html`);
        } else if (path.endsWith('/password') || path.endsWith('/password/')) {
          location.replace(`${base}/password.html`);
        } else if (path.endsWith('/docs') || path.includes('/docs/')) {
          location.replace(`${base}/docs.html`);
        } else {
          location.replace(`${base}/index.html`);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
